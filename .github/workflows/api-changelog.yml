name: API Changelog

on:
  workflow_dispatch:
    inputs:
      camunda_branch:
        description: 'Branch of camunda/camunda to generate the SDK from'
        required: true
        type: string

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  api-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout tsc-api-changelog
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clone orchestration-cluster-api-js to temp directory
        id: sdk
        run: |
          SDK_DIR=$(mktemp -d)
          git clone https://github.com/camunda/orchestration-cluster-api-js "$SDK_DIR"
          echo "dir=$SDK_DIR" >> "$GITHUB_OUTPUT"

      - name: Install SDK dependencies
        working-directory: ${{ steps.sdk.outputs.dir }}
        run: npm ci

      - name: Generate SDK from branch
        working-directory: ${{ steps.sdk.outputs.dir }}
        run: SPEC_REF=${{ inputs.camunda_branch }} npm run generate

      - name: Install tsc-api-changelog dependencies
        run: npm ci

      - name: Build tsc-api-changelog
        run: npm run build

      - name: Generate timestamp
        id: timestamp
        run: echo "ts=$(date -u '+%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Sanitize branch name for filename
        id: branch
        run: |
          SAFE_BRANCH=$(echo "${{ inputs.camunda_branch }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "safe=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate Markdown report
        run: |
          node dist/cli.js \
            --old stable/8.8 \
            --new WORKTREE \
            --repo "${{ steps.sdk.outputs.dir }}" \
            --format markdown \
            --output "reports/${{ steps.timestamp.outputs.ts }}_${{ steps.branch.outputs.safe }}.md" \
            || true

      - name: Generate JSON report
        run: |
          node dist/cli.js \
            --old stable/8.8 \
            --new WORKTREE \
            --repo "${{ steps.sdk.outputs.dir }}" \
            --format json \
            --output "reports/${{ steps.timestamp.outputs.ts }}_${{ steps.branch.outputs.safe }}.json" \
            || true

      - name: Cleanup temp SDK clone
        if: always()
        run: rm -rf "${{ steps.sdk.outputs.dir }}"

      - name: Display report in summary
        run: |
          REPORT="reports/${{ steps.timestamp.outputs.ts }}_${{ steps.branch.outputs.safe }}.md"
          {
            echo "## API Changelog"
            echo ""
            echo "**Branch:** \`${{ inputs.camunda_branch }}\`  |  **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            if [[ -f "$REPORT" ]]; then
              cat "$REPORT"
            else
              echo "_No markdown report was generated._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: api-changelog-${{ steps.timestamp.outputs.ts }}_${{ steps.branch.outputs.safe }}
          path: reports/
